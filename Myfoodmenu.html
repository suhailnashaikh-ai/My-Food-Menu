<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Food menu</title>
    <style>
        body {
            font-family: Arial;
            background: #fff8f0;
            padding: 30px;
            text-align: center;
        }

        h1 { color: #e65c00; }
        h1 + p {
            background: #ffe0b2;
            padding: 10px 20px;
            border-radius: 8px;
            color: #bf360c;
            display: inline-block;
        }
         ul { padding: 0; margin-top:20px}
         ul > li {
            list-style: none;
            font-size: 18px;
            font-weight: bold;
            color: #5d4037;
            padding: 10px 20px;
            margin: 6px auto;
            width: 260px;
            background: #fff3e0;
            border-radius: 8px;
         }

         ul li:nth-child(3) {
            background: #ffe082;
            color: #e65c00;
         }

         .desc {
            color: #555;
            margin-top: 20px;
            font-size: 15px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
         }

         .desc::first-letter {
            font-size: 220%;
            color: #e65c00;
            font-weight: bold;
         }

         .links { margin-top: 25px; }

         a {
            color: #e65c00;
            text-decoration: none;
            font-size: 15px;
            margin: 0 12px;
            padding: 8px 18px;
            border: solid #e65c00;
            border-radius: 8px;
         }

         a:hover {
            background: #e65c00;
            color: white;
         }
    </style>
</head>
<body>
    <h1>My Food Menu</h1>
    <p>Pick Your Favorite Dish And Dig In !</p>

    <ul>
        <li>Pizza</li>
        <li>Burger</li>
        <li>Tacos-Chefs Special</li>
        <li>Noodles</li>
        <li>Icecream</li>
    </ul>

    <p class="desc">Every Dish On This Menu Is Made With Love And Loads Of Flavor. Try All Of Them And Find Your Favorite!</p>

    <div class="links">
    <a href="#">Order Now</a>
    <a href="#">See More</a>
    </div>
</body>
</html>
